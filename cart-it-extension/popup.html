<!DOCTYPE html>
<html>
  <head>
    <style>
      :root {
        --primary-color: #DB8046;
        --bg-color: #f9f9f9;
        --text-color: #333;
      }
      body { 
        width: 300px; 
        padding: 20px; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        margin: 0;
      }
      h3 { margin-top: 0; color: #1a1a1a; font-size: 18px; border-bottom: 2px solid var(--primary-color); padding-bottom: 5px; }
      
      #product-img { 
        width: 100%; 
        max-height: 150px; 
        object-fit: contain; 
        border-radius: 6px; 
        margin: 10px 0; 
        background: white;
      }
      
      #product-name { font-weight: 700; font-size: 14px; margin: 5px 0; color: var(--text-color); line-height: 1.3; }
      #product-price { font-weight: 500; color: #2e7d32; margin-bottom: 15px; font-size: 15px; }
      
      .field { margin-bottom: 15px; }
      label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: bold; }
      select, textarea { 
        width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; 
      }
      
      button { 
        width: 100%; padding: 12px; cursor: pointer; background: var(--primary-color); 
        color: white; border: none; border-radius: 4px; font-weight: bold; transition: background 0.2s;
      }
      button:hover { background: #c56e36; }
      button:disabled { background: #ccc; cursor: not-allowed; }
      
      #loader { padding: 20px; font-style: italic; color: #888; }
    </style>
  </head>
  <body>
    <div id="main-ui">
      <h3>Cart-It</h3>
      <div id="loader" style="display: none; text-align: center; color: #666;">Fetching details...</div>
      <img id="product-img" src="" alt="" />
      <p id="product-name" style="font-weight: bold; margin: 5px 0;"></p>
      <p id="product-price" style="margin-top: 0; color: #2e7d32;"></p>
      
      <div class="field">
        <label>Select List</label>
        <select id="listSelect"><option value="">My Cart (Default)</option></select>
      </div>
      <div class="field">
        <label>Notes (optional)</label>
        <textarea id="notes" placeholder="e.g., Runs small" rows="2" maxlength="500"></textarea>
      </div>
      <button id="saveBtn">Cart It!</button>
    </div>

    <div id="success-ui" style="display: none; text-align: center; padding: 20px;">
      <div style="font-size: 40px; margin-bottom: 10px;">✅</div>
      <p id="success-msg" style="font-weight: bold; color: #333;"></p>
      <a id="redirect-link" href="#" style="color: #DB8046; font-weight: bold; text-decoration: underline; cursor: pointer;"></a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
