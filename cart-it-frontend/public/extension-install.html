<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cart-It Extension Install</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #4a103d; color: #fff7ed; }
      .card { max-width: 560px; margin: 0 auto; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); border-radius: 16px; padding: 20px; }
      h1 { margin-top: 0; }
      button { border: 0; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; margin-right: 8px; }
      .primary { background: #ea580c; color: #fff; }
      .secondary { background: #e2e8f0; color: #1f2937; }
      .hint { margin-top: 10px; font-size: 0.9rem; color: #fed7aa; min-height: 20px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Install Cart-It Extension</h1>
      <p>Use one of these buttons, paste the copied URL into your address bar, enable Developer mode, and click Load unpacked.</p>
      <button class="primary" id="edgeBtn">Copy edge://extensions</button>
      <button class="secondary" id="chromeBtn">Copy chrome://extensions</button>
      <p class="hint" id="hint"></p>
    </div>
    <script>
      const hint = document.getElementById("hint");
      function copy(text) {
        navigator.clipboard.writeText(text).then(
          () => (hint.textContent = "Copied. Paste in your address bar and press Enter."),
          () => (hint.textContent = `Copy manually: ${text}`)
        );
      }
      document.getElementById("edgeBtn").addEventListener("click", () => copy("edge://extensions"));
      document.getElementById("chromeBtn").addEventListener("click", () => copy("chrome://extensions"));
    </script>
  </body>
</html>
