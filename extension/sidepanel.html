<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        font-family: system-ui, sans-serif;
        min-height: 100%;
        background: #faf8f5;
      }
      .edge-strip {
        width: 12px;
        flex-shrink: 0;
        background: repeating-linear-gradient(
          -45deg,
          #ea580c,
          #ea580c 7px,
          #fecdd3 7px,
          #fecdd3 14px
        );
        box-shadow: inset -2px 0 6px rgba(0, 0, 0, 0.08);
      }
      .panel-inner {
        flex: 1;
        min-width: 0;
        padding: 14px 16px 20px;
        max-width: 420px;
      }
      .popup-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
      }
      .popup-header img {
        width: 36px;
        height: 36px;
        object-fit: contain;
        border-radius: 8px;
      }
      .popup-header h3 {
        margin: 0;
        font-size: 1.15rem;
      }
      #authStatus {
        font-size: 11px;
        line-height: 1.4;
        margin: 0 0 10px;
      }
      #tabHint {
        font-size: 12px;
        color: #64748b;
        margin: 0 0 14px;
        line-height: 1.35;
        word-break: break-word;
      }
      label {
        display: block;
        font-size: 11px;
        margin-top: 12px;
        color: #444;
        font-weight: 600;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 8px 10px;
        margin-top: 4px;
        font-size: 13px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-family: inherit;
        background: #fff;
        min-height: 40px;
      }
      textarea {
        min-height: 72px;
        resize: vertical;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #db8046;
        box-shadow: 0 0 0 2px rgba(219, 128, 70, 0.25);
      }
      button {
        margin-top: 14px;
        width: 100%;
        padding: 12px;
        background: #db8046;
        color: #fff;
        border: 0;
        border-radius: 10px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
      }
      button.secondary {
        background: #e2e8f0;
        color: #1e293b;
      }
      button.link-btn {
        margin-top: 8px;
        width: auto;
        padding: 0;
        background: none;
        color: #c2410c;
        font-weight: 600;
        font-size: 12px;
        text-decoration: underline;
        text-align: left;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #status {
        margin-top: 12px;
        font-size: 12px;
        line-height: 1.4;
        word-break: break-word;
      }
      #viewWishlistLink {
        display: inline-block;
        margin-top: 8px;
        font-size: 13px;
        font-weight: 700;
        color: #9a3412;
        text-decoration: underline;
      }
      #viewWishlistLink[hidden] {
        display: none !important;
      }
      .ok {
        color: #166534;
      }
      .err {
        color: #991b1b;
      }
      .new-cat-wrap {
        margin-top: 10px;
        padding: 10px;
        border-radius: 10px;
        background: #fff;
        border: 1px solid #e2e8f0;
      }
      .new-cat-wrap[hidden] {
        display: none !important;
      }
      .new-cat-wrap label:first-of-type {
        margin-top: 0;
      }
      .new-cat-wrap button#createCatBtn {
        margin-top: 10px;
      }
      details {
        margin-top: 14px;
      }
      summary {
        font-size: 11px;
        color: #64748b;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="edge-strip" aria-hidden="true"></div>
    <div class="panel-inner">
      <div class="popup-header">
        <img src="icon.png" width="36" height="36" alt="" />
        <h3>cart-It</h3>
      </div>
      <p id="authStatus" class="hint"></p>

      <div id="signInWrap">
        <label for="signInEmail">Email</label>
        <input id="signInEmail" type="email" autocomplete="username" />
        <label for="signInPassword">Password</label>
        <input id="signInPassword" type="password" autocomplete="current-password" />
        <button type="button" id="signInBtn" class="secondary">Sign in</button>
        <button type="button" id="createAccountBtn" class="link-btn">Create account (opens browser)</button>
      </div>

      <p id="tabHint" aria-live="polite"></p>

      <label for="listScope">Save to</label>
      <select id="listScope">
        <option value="Private">Private wishlist</option>
        <option value="Shared">Shared wishlist</option>
      </select>

      <label for="category">Category</label>
      <select id="category">
        <option value="">No category</option>
      </select>
      <button type="button" id="toggleNewCat" class="link-btn">+ Create new category</button>
      <div id="newCatWrap" class="new-cat-wrap" hidden>
        <label for="newCatName">Name</label>
        <input id="newCatName" type="text" placeholder="e.g. Holiday gifts" autocomplete="off" />
        <button type="button" id="createCatBtn" class="secondary">Create category</button>
      </div>

      <label for="notes">Notes (optional)</label>
      <textarea id="notes" placeholder="Sizing, color, reminders…"></textarea>
      <label for="manualPrice">Price (optional)</label>
      <input id="manualPrice" type="number" min="0" step="0.01" placeholder="Auto-detected from page" />
      <div id="priceHint" style="margin-top:6px;font-size:12px;line-height:1.35;"></div>
      <button type="button" id="saveBtn">Save item</button>
      <div id="status"></div>
      <a id="viewWishlistLink" href="#" target="_blank" rel="noreferrer" hidden>See item in wishlist</a>

      <details>
        <summary>Advanced — API &amp; web app URL</summary>
        <label for="webAppOrigin">Web app (for links)</label>
        <input id="webAppOrigin" type="text" placeholder="https://cart-it.com" autocomplete="off" />
        <label for="apiBase">API (Express)</label>
        <input id="apiBase" type="text" placeholder="https://cart-it.onrender.com" autocomplete="off" />
      </details>
    </div>
    <script src="config.js"></script>
    <script src="panel.js"></script>
  </body>
</html>
